spring:
  application:
    name: backend

  # PostgreSQL
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  # Mail (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 Client (placeholder - will configure in Sub-Plan 3)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope: email, public_profile

# JWT Config
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 600000      # 10 minutes (ms)
  refresh-token-expiration: 604800000  # 7 days (ms)
  email-verification-expiration: 86400000  # 24 hours (ms)

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# App Config
app:
  frontend-url: http://localhost:5173
  backend-url: http://localhost:8080

# Storage Config for Cloudflare R2 (S3 compatible)
storage:
  s3:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    endpoint: ${R2_ENDPOINT}
    bucket-name: ${R2_BUCKET_NAME}
    region: auto

# AI Config for Gemini
ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model-name: gemini-1.5-flash

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
