spring:
  application:
    name: backend

  # PostgreSQL
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  # Mail (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587 # Port chuẩn cho TLS
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD} # Cứ viết liền nhau, không cần dấu cách
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true # Bắt buộc phải bật TLS khi dùng Gmail
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # OAuth2 Client (placeholder - will configure in Sub-Plan 3)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
            - email
            - profile
        facebook:
          client-id: ${FACEBOOK_CLIENT_ID}
          client-secret: ${FACEBOOK_CLIENT_SECRET}
          scope:
            - email
            - public_profile

# JWT Config
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 600000      # 10 minutes (ms)
  refresh-token-expiration: 604800000  # 7 days (ms)
  email-verification-expiration: 86400000  # 24 hours (ms)

# App Config
app:
  frontend-url: http://localhost:5173
  backend-url: http://localhost:8080

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
