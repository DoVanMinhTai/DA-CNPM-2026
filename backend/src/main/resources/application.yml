spring:
  application:
    name: backend

  # PostgreSQL
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  # Mail (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587 # Port chuẩn cho TLS
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD} # Cứ viết liền nhau, không cần dấu cách
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true # Bắt buộc phải bật TLS khi dùng Gmail
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # OAuth2 Client (placeholder - will configure in Sub-Plan 3)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
            - email
            - profile
        facebook:
          client-id: ${FACEBOOK_CLIENT_ID}
          client-secret: ${FACEBOOK_CLIENT_SECRET}
          scope:
            - email
            - public_profile

# JWT Config
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 600000      # 10 minutes (ms)
  refresh-token-expiration: 604800000  # 7 days (ms)
  email-verification-expiration: 86400000  # 24 hours (ms)

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# App Config
app:
  frontend-url: http://localhost:5173
  backend-url: http://localhost:8080

# Storage Config for Cloudflare R2 (S3 compatible)
storage:
  s3:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    endpoint: ${R2_ENDPOINT}
    bucket-name: ${R2_BUCKET_NAME}
    region: auto

# AI Config for Gemini
ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model-name: gemini-2.5-flash
  groq:
    api-key: ${GROQ_API_KEY}
    model-name: llama-3.3-70b-versatile
    base-url: https://api.groq.com/openai/v1

vnpay:
  url: ${VNPAY_PAY_URL}
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  return-url: ${VNPAY_RETURN_URL}

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
